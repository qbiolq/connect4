<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Four">
<meta name="theme-color" content="#ffffff">
<link rel="apple-touch-icon" href="icon.png">
<link rel="manifest" href="manifest.json">
<title>Connect Four</title>
<style>
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; -webkit-touch-callout: none; user-select: none; }
  html, body { margin: 0; padding: 0; background: #f5f5f7; font-family: -apple-system, BlinkMacSystemFont, system-ui, sans-serif; overscroll-behavior: none; }
  body { min-height: 100vh; min-height: 100dvh; display: flex; justify-content: center; padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left); }
  #app { width: 100%; max-width: 420px; background: #fff; padding: 16px; display: flex; flex-direction: column; gap: 12px; }
  .header { display: flex; justify-content: space-between; align-items: center; }
  .title { font-size: 12px; font-weight: 700; color: #111; letter-spacing: 2px; }
  .mode-pill { font-size: 10px; font-weight: 700; color: #fff; padding: 5px 10px; letter-spacing: 1px; }
  .tabs { display: flex; border: 2px solid #111; }
  .tab { flex: 1; background: #fff; color: #111; border: none; padding: 12px; font-size: 11px; font-weight: 700; letter-spacing: 1px; cursor: pointer; font-family: inherit; }
  .tab.active { background: #111; color: #fff; }
  .mirror-panel { padding: 12px; background: #fff5e6; border: 2px solid #ff9500; display: none; }
  .mirror-panel.visible { display: block; }
  .panel-label { font-size: 11px; font-weight: 700; color: #b35900; letter-spacing: 1px; margin-bottom: 8px; }
  .paint-row { display: flex; gap: 6px; margin-bottom: 8px; }
  .paint-btn { flex: 1; border: 2px solid #111; padding: 10px; font-size: 10px; font-weight: 700; letter-spacing: 0.5px; cursor: pointer; font-family: inherit; background: #fff; color: #111; }
  .paint-btn.active-red { background: #ff3b30; color: #fff; }
  .paint-btn.active-yel { background: #ffcc00; color: #111; }
  .paint-btn.active-erase { background: #111; color: #fff; }
  .turn-row { display: flex; align-items: center; gap: 8px; }
  .turn-row .panel-label { margin: 0; flex: 1; }
  .turn-btn { background: #fff; color: #111; border: 2px solid #111; padding: 6px 12px; font-size: 10px; font-weight: 700; cursor: pointer; font-family: inherit; }
  .turn-btn.active-red { background: #ff3b30; color: #fff; }
  .turn-btn.active-yel { background: #ffcc00; color: #111; }
  .players { display: flex; gap: 8px; }
  .player { flex: 1; padding: 10px; border: 2px solid #ddd; display: flex; align-items: center; gap: 8px; }
  .player.active-red { border-color: #ff3b30; }
  .player.active-yel { border-color: #ffcc00; }
  .chip-icon { width: 22px; height: 22px; border-radius: 50%; flex-shrink: 0; }
  .chip-red { background: #ff3b30; }
  .chip-yel { background: #ffcc00; }
  .player-label { font-size: 9px; font-weight: 700; color: #111; letter-spacing: 1px; }
  .player-status { font-size: 12px; font-weight: 600; color: #999; }
  .player.active .player-status { color: #111; }
  .board-wrap { position: relative; }
  .arrows { position: absolute; top: -24px; left: 0; right: 0; display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; pointer-events: none; }
  .arrow { height: 20px; display: flex; align-items: center; justify-content: center; color: #34c759; font-size: 16px; font-weight: 900; }
  .arrow.pulse { animation: pulse 1s ease-in-out infinite; }
  @keyframes pulse { 0%, 100% { opacity: 0.4; } 50% { opacity: 1; } }
  @keyframes drop { 0% { transform: translateY(-280px); } 75% { transform: translateY(6px); } 100% { transform: translateY(0); } }
  .board { background: #007aff; padding: 6px; display: grid; grid-template-columns: repeat(7, 1fr); grid-auto-rows: 1fr; gap: 4px; aspect-ratio: 7 / 6; }
  .cell { background: #fff; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; }
  .chip { width: 84%; height: 84%; border-radius: 50%; }
  .chip.drop { animation: drop 0.35s cubic-bezier(0.5, 0, 0.5, 1.2); }
  .hintbar { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; height: 5px; margin-top: 6px; padding: 0 6px; }
  .hintbar div { background: #eee; }
  .coach { padding: 14px; min-height: 50px; display: flex; align-items: center; gap: 12px; background: #34c759; transition: background 0.2s; }
  .coach-icon { font-size: 16px; font-weight: 900; color: #fff; }
  .coach-text { font-size: 13px; color: #fff; font-weight: 600; line-height: 1.3; flex: 1; }
  .controls { display: flex; gap: 6px; }
  .ctrl-btn { flex: 1; background: #fff; color: #111; border: 2px solid #111; padding: 12px; font-size: 10px; font-weight: 700; letter-spacing: 1px; cursor: pointer; font-family: inherit; }
  .ctrl-btn.primary { background: #111; color: #fff; }
  .ctrl-btn:active { opacity: 0.7; }
  .tab:active, .paint-btn:active, .turn-btn:active { opacity: 0.7; }
  @media (max-width: 360px) { #app { padding: 12px; gap: 10px; } .title { font-size: 11px; } }
</style>
</head>
<body>

<div id="app">
  <div class="header">
    <div class="title">CONNECT FOUR</div>
    <div id="mode-pill" class="mode-pill" style="background: #ff3b30;">PLAY MODE</div>
  </div>

  <div class="tabs">
    <button id="tab-play" class="tab active">PLAY VS AI</button>
    <button id="tab-mirror" class="tab">MIRROR GAME</button>
  </div>

  <div id="mirror-panel" class="mirror-panel">
    <div class="panel-label">PAINT THE BOARD</div>
    <div class="paint-row">
      <button id="paint-red" class="paint-btn active-red">RED</button>
      <button id="paint-yel" class="paint-btn">YELLOW</button>
      <button id="paint-erase" class="paint-btn">ERASE</button>
    </div>
    <div class="turn-row">
      <div class="panel-label">NEXT MOVE</div>
      <button id="turn-red" class="turn-btn active-red">RED</button>
      <button id="turn-yel" class="turn-btn">YEL</button>
    </div>
  </div>

  <div id="players" class="players">
    <div id="p1" class="player active active-red">
      <div class="chip-icon chip-red"></div>
      <div>
        <div class="player-label">YOU</div>
        <div id="p1-status" class="player-status">Your turn</div>
      </div>
    </div>
    <div id="p2" class="player">
      <div class="chip-icon chip-yel"></div>
      <div>
        <div class="player-label">AI</div>
        <div id="p2-status" class="player-status">Waiting</div>
      </div>
    </div>
  </div>

  <div class="board-wrap">
    <div id="arrows" class="arrows"></div>
    <div id="board" class="board"></div>
    <div id="hintbar" class="hintbar"></div>
  </div>

  <div id="coach" class="coach">
    <div class="coach-icon">→</div>
    <div id="coach-text" class="coach-text">Center column is the strongest opening</div>
  </div>

  <div class="controls">
    <button id="btn-undo" class="ctrl-btn">UNDO</button>
    <button id="btn-reset" class="ctrl-btn">RESET</button>
    <button id="btn-diff" class="ctrl-btn primary"><span id="diff-label">MEDIUM</span></button>
  </div>
</div>

<script>
(function () {
  const ROWS = 6, COLS = 7;
  const EMPTY = 0, RED = 1, YEL = 2;
  const WIN = 100000;
  const DIFFICULTIES = [
    { name: 'EASY', depth: 3 },
    { name: 'MEDIUM', depth: 5 },
    { name: 'HARD', depth: 7 },
    { name: 'BRUTAL', depth: 9 }
  ];

  let diffIdx = 1;
  let mode = 'play';
  let paint = RED;
  let board, turn, history, gameOver, aiThinking;
  let hintScores = new Array(COLS).fill(null);

  const $ = (id) => document.getElementById(id);
  const boardEl = $('board'), arrowsEl = $('arrows'), hintbarEl = $('hintbar');
  const modePill = $('mode-pill'), mirrorPanel = $('mirror-panel'), playersEl = $('players');
  const tabPlay = $('tab-play'), tabMirror = $('tab-mirror');
  const p1El = $('p1'), p2El = $('p2'), p1Status = $('p1-status'), p2Status = $('p2-status');
  const coachEl = $('coach'), coachText = $('coach-text');
  const paintRedBtn = $('paint-red'), paintYelBtn = $('paint-yel'), paintEraseBtn = $('paint-erase');
  const turnRedBtn = $('turn-red'), turnYelBtn = $('turn-yel');
  const undoBtn = $('btn-undo'), resetBtn = $('btn-reset'), diffBtn = $('btn-diff'), diffLabel = $('diff-label');

  function newBoard() { return Array.from({ length: ROWS }, () => Array(COLS).fill(EMPTY)); }

  function reset() {
    board = newBoard(); turn = RED; history = []; gameOver = false; aiThinking = false;
    hintScores = new Array(COLS).fill(null);
    updateAll();
    if (mode === 'play') computeHints(); else recomputeMirrorHints();
  }

  function topEmpty(b, col) {
    for (let r = ROWS - 1; r >= 0; r--) if (b[r][col] === EMPTY) return r;
    return -1;
  }

  function checkWin(b, r, c, p) {
    const dirs = [[0,1],[1,0],[1,1],[1,-1]];
    for (const [dr, dc] of dirs) {
      let count = 1;
      for (let s = 1; s < 4; s++) { const nr = r+dr*s, nc = c+dc*s; if (nr<0||nr>=ROWS||nc<0||nc>=COLS||b[nr][nc]!==p) break; count++; }
      for (let s = 1; s < 4; s++) { const nr = r-dr*s, nc = c-dc*s; if (nr<0||nr>=ROWS||nc<0||nc>=COLS||b[nr][nc]!==p) break; count++; }
      if (count >= 4) return true;
    }
    return false;
  }

  function isFull(b) { for (let c = 0; c < COLS; c++) if (b[0][c] === EMPTY) return false; return true; }

  function evalBoard(b, p) {
    const opp = p === RED ? YEL : RED;
    let score = 0;
    const lines = [];
    for (let r = 0; r < ROWS; r++) for (let c = 0; c <= COLS-4; c++) lines.push([[r,c],[r,c+1],[r,c+2],[r,c+3]]);
    for (let c = 0; c < COLS; c++) for (let r = 0; r <= ROWS-4; r++) lines.push([[r,c],[r+1,c],[r+2,c],[r+3,c]]);
    for (let r = 0; r <= ROWS-4; r++) for (let c = 0; c <= COLS-4; c++) lines.push([[r,c],[r+1,c+1],[r+2,c+2],[r+3,c+3]]);
    for (let r = 3; r < ROWS; r++) for (let c = 0; c <= COLS-4; c++) lines.push([[r,c],[r-1,c+1],[r-2,c+2],[r-3,c+3]]);
    for (const line of lines) {
      let mine = 0, theirs = 0;
      for (const [r, c] of line) { if (b[r][c] === p) mine++; else if (b[r][c] === opp) theirs++; }
      if (mine && theirs) continue;
      if (mine === 3) score += 50; else if (mine === 2) score += 5;
      if (theirs === 3) score -= 60; else if (theirs === 2) score -= 5;
    }
    for (let r = 0; r < ROWS; r++) if (b[r][3] === p) score += 3;
    return score;
  }

  function minimax(b, depth, alpha, beta, maximizing, aiP) {
    const oppP = aiP === RED ? YEL : RED;
    if (isFull(b)) return 0;
    if (depth === 0) return evalBoard(b, aiP);
    const order = [3,2,4,1,5,0,6];
    if (maximizing) {
      let best = -Infinity;
      for (const c of order) {
        const r = topEmpty(b, c); if (r === -1) continue;
        b[r][c] = aiP;
        const score = checkWin(b, r, c, aiP) ? WIN + depth : minimax(b, depth-1, alpha, beta, false, aiP);
        b[r][c] = EMPTY;
        if (score > best) best = score;
        alpha = Math.max(alpha, score);
        if (alpha >= beta) break;
      }
      return best;
    } else {
      let best = Infinity;
      for (const c of order) {
        const r = topEmpty(b, c); if (r === -1) continue;
        b[r][c] = oppP;
        const score = checkWin(b, r, c, oppP) ? -WIN - depth : minimax(b, depth-1, alpha, beta, true, aiP);
        b[r][c] = EMPTY;
        if (score < best) best = score;
        beta = Math.min(beta, score);
        if (alpha >= beta) break;
      }
      return best;
    }
  }

  function scoreEachColumn(forPlayer, depth) {
    const scores = [];
    for (let c = 0; c < COLS; c++) {
      const r = topEmpty(board, c);
      if (r === -1) { scores.push(null); continue; }
      board[r][c] = forPlayer;
      const score = checkWin(board, r, c, forPlayer) ? WIN + depth : minimax(board, depth-1, -Infinity, Infinity, false, forPlayer);
      board[r][c] = EMPTY;
      scores.push(score);
    }
    return scores;
  }

  function categorize(s) {
    if (s === null) return 'none';
    if (s >= WIN) return 'win';
    if (s <= -WIN) return 'loss';
    if (s > 150) return 'good';
    if (s < -150) return 'bad';
    return 'neutral';
  }

  function colorFor(cat) {
    return { win:'#34c759', good:'#5ac84a', neutral:'#8e8e93', bad:'#ff9500', loss:'#ff3b30' }[cat] || '#ddd';
  }

  function coachMessage(bestCol, bestScore, bestCat, prefix) {
    if (bestCol < 0) return 'Board is full';
    const col = bestCol + 1;
    const p = prefix ? `${prefix}: ` : '';
    if (bestCat === 'win') return bestScore >= WIN + 8 ? `${p}play column ${col}, forced win` : `${p}column ${col} wins now!`;
    if (bestCat === 'good') return `${p}column ${col} is your strongest move`;
    if (bestCat === 'neutral') return `${p}column ${col} keeps it even`;
    if (bestCat === 'bad') return `${p}column ${col} is your best defence`;
    if (bestCat === 'loss') return prefix ? `${prefix} is losing — every column fails` : 'Tough spot — every move loses';
    return '';
  }

  function computeHints() {
    if (gameOver || aiThinking || turn !== RED) { renderHintBar(); renderArrows(); return; }
    const depth = Math.max(3, DIFFICULTIES[diffIdx].depth - 1);
    hintScores = scoreEachColumn(turn, depth);
    let bestCol = -1, bestScore = -Infinity;
    for (let c = 0; c < COLS; c++) if (hintScores[c] !== null && hintScores[c] > bestScore) { bestScore = hintScores[c]; bestCol = c; }
    const cat = categorize(bestScore);
    coachText.textContent = coachMessage(bestCol, bestScore, cat);
    coachEl.style.background = colorFor(cat);
    renderHintBar();
    renderArrows(bestCol);
  }

  function recomputeMirrorHints() {
    const depth = DIFFICULTIES[diffIdx].depth;
    hintScores = scoreEachColumn(turn, depth);
    let bestCol = -1, bestScore = -Infinity;
    for (let c = 0; c < COLS; c++) if (hintScores[c] !== null && hintScores[c] > bestScore) { bestScore = hintScores[c]; bestCol = c; }
    const cat = categorize(bestScore);
    coachText.textContent = coachMessage(bestCol, bestScore, cat, turn === RED ? 'RED' : 'YELLOW');
    coachEl.style.background = bestCol >= 0 ? colorFor(cat) : '#8e8e93';
    renderHintBar(true);
    renderArrows(bestCol, true);
  }

  function renderHintBar(forceShow) {
    hintbarEl.innerHTML = '';
    const visible = forceShow || (!gameOver && turn === RED && !aiThinking && mode === 'play');
    for (let c = 0; c < COLS; c++) {
      const bar = document.createElement('div');
      if (visible && hintScores[c] !== null) bar.style.background = colorFor(categorize(hintScores[c]));
      hintbarEl.appendChild(bar);
    }
  }

  function renderArrows(bestCol, forceShow) {
    arrowsEl.innerHTML = '';
    const visible = (forceShow || (!gameOver && turn === RED && !aiThinking && mode === 'play')) && bestCol !== undefined && bestCol >= 0;
    for (let c = 0; c < COLS; c++) {
      const a = document.createElement('div');
      a.className = 'arrow';
      if (visible && c === bestCol) { a.textContent = '▼'; a.classList.add('pulse'); }
      arrowsEl.appendChild(a);
    }
  }

  function updateAll() {
    if (mode === 'play') {
      modePill.textContent = 'PLAY MODE'; modePill.style.background = '#ff3b30';
      tabPlay.classList.add('active'); tabMirror.classList.remove('active');
      mirrorPanel.classList.remove('visible');
      playersEl.style.display = 'flex';
      const redActive = turn === RED && !gameOver;
      const yelActive = turn === YEL && !gameOver;
      p1El.classList.toggle('active', redActive);
      p2El.classList.toggle('active', yelActive);
      p1El.classList.toggle('active-red', redActive);
      p2El.classList.toggle('active-yel', yelActive);
      if (gameOver) {
        p1Status.textContent = 'Game over'; p2Status.textContent = 'Game over';
      } else {
        p1Status.textContent = redActive ? 'Your turn' : 'Waiting';
        p2Status.textContent = yelActive ? (aiThinking ? 'Thinking…' : 'AI turn') : 'Waiting';
      }
    } else {
      modePill.textContent = 'MIRROR MODE'; modePill.style.background = '#ff9500';
      tabPlay.classList.remove('active'); tabMirror.classList.add('active');
      mirrorPanel.classList.add('visible');
      playersEl.style.display = 'none';
      paintRedBtn.classList.toggle('active-red', paint === RED);
      paintYelBtn.classList.toggle('active-yel', paint === YEL);
      paintEraseBtn.classList.toggle('active-erase', paint === EMPTY);
      turnRedBtn.classList.toggle('active-red', turn === RED);
      turnYelBtn.classList.toggle('active-yel', turn === YEL);
    }
    render();
  }

  function aiMove() {
    aiThinking = true; updateAll(); renderHintBar(); renderArrows();
    setTimeout(() => {
      const depth = DIFFICULTIES[diffIdx].depth;
      const scores = scoreEachColumn(YEL, depth);
      let bestCol = -1, bestScore = -Infinity;
      const order = [3,2,4,1,5,0,6];
      for (const c of order) if (scores[c] !== null && scores[c] > bestScore) { bestScore = scores[c]; bestCol = c; }
      aiThinking = false;
      if (bestCol >= 0) doMove(bestCol);
    }, 120);
  }

  function doMove(col) {
    if (gameOver || mode !== 'play') return;
    const r = topEmpty(board, col); if (r < 0) return;
    board[r][col] = turn;
    history.push({ r, c: col });
    const won = checkWin(board, r, col, turn);
    render(r, col);
    if (won) {
      gameOver = true;
      coachText.textContent = turn === RED ? '🏆 You win!' : 'AI wins!';
      coachEl.style.background = turn === RED ? '#34c759' : '#ff3b30';
      hintScores = new Array(COLS).fill(null);
      updateAll(); renderHintBar(); renderArrows();
      navigator.vibrate && navigator.vibrate(turn === RED ? [50, 30, 50] : 80);
      return;
    }
    if (isFull(board)) {
      gameOver = true;
      coachText.textContent = "It's a draw";
      coachEl.style.background = '#8e8e93';
      updateAll(); renderHintBar(); renderArrows();
      return;
    }
    navigator.vibrate && navigator.vibrate(10);
    turn = turn === RED ? YEL : RED;
    updateAll();
    if (turn === YEL && !aiThinking) aiMove(); else computeHints();
  }

  function paintCell(col) {
    if (paint === EMPTY) {
      for (let r = 0; r < ROWS; r++) if (board[r][col] !== EMPTY) { board[r][col] = EMPTY; break; }
    } else {
      const r = topEmpty(board, col);
      if (r >= 0) board[r][col] = paint;
    }
    navigator.vibrate && navigator.vibrate(8);
    render();
    recomputeMirrorHints();
  }

  function undo() {
    if (mode !== 'play' || aiThinking || history.length === 0) return;
    gameOver = false;
    const pops = history.length >= 2 ? 2 : 1;
    for (let i = 0; i < pops; i++) {
      const last = history.pop(); if (!last) break;
      board[last.r][last.c] = EMPTY;
      turn = turn === RED ? YEL : RED;
    }
    updateAll(); computeHints();
  }

  function render(lastR, lastC) {
    boardEl.innerHTML = '';
    for (let r = 0; r < ROWS; r++) {
      for (let c = 0; c < COLS; c++) {
        const cell = document.createElement('div');
        cell.className = 'cell';
        const v = board[r][c];
        if (v !== EMPTY) {
          const chip = document.createElement('div');
          chip.className = 'chip ' + (v === RED ? 'chip-red' : 'chip-yel');
          if (r === lastR && c === lastC) chip.classList.add('drop');
          cell.appendChild(chip);
        }
        cell.addEventListener('click', () => {
          if (mode === 'mirror') { paintCell(c); return; }
          if (aiThinking || gameOver || turn !== RED) return;
          doMove(c);
        });
        boardEl.appendChild(cell);
      }
    }
  }

  tabPlay.addEventListener('click', () => { mode = 'play'; reset(); });
  tabMirror.addEventListener('click', () => { mode = 'mirror'; reset(); });
  paintRedBtn.addEventListener('click', () => { paint = RED; updateAll(); });
  paintYelBtn.addEventListener('click', () => { paint = YEL; updateAll(); });
  paintEraseBtn.addEventListener('click', () => { paint = EMPTY; updateAll(); });
  turnRedBtn.addEventListener('click', () => { turn = RED; updateAll(); recomputeMirrorHints(); });
  turnYelBtn.addEventListener('click', () => { turn = YEL; updateAll(); recomputeMirrorHints(); });
  undoBtn.addEventListener('click', undo);
  resetBtn.addEventListener('click', reset);
  diffBtn.addEventListener('click', () => {
    diffIdx = (diffIdx + 1) % DIFFICULTIES.length;
    diffLabel.textContent = DIFFICULTIES[diffIdx].name;
    if (mode === 'play' && !gameOver && turn === RED && !aiThinking) computeHints();
    else if (mode === 'mirror') recomputeMirrorHints();
  });

  reset();

  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => navigator.serviceWorker.register('sw.js').catch(() => {}));
  }
})();
</script>
</body>
</html>
